<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>BMI Calculator</h1>
            <p class="subtitle">Enter your weight in kilograms and height in centimeters.</p>

            <form method="post">
                {% csrf_token %}
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" name="weight" step="0.01" min="0" value="{{ weight }}" required>

                <label for="height">Height (cm)</label>
                <input type="number" id="height" name="height" step="0.01" min="0" value="{{ height }}" required>

                <button type="submit">Calculate BMI</button>
            </form>

            {% if error %}
                <div class="result error">{{ error }}</div>
            {% endif %}

            {% if bmi %}
                <div class="result">
                    <h2>Your BMI: {{ bmi }}</h2>
                    <p>Category: <strong>{{ category }}</strong></p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
